name: Build AppImage

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rsync \
            wget \
            fuse \
            libfuse2 \
            file \
            desktop-file-utils \
            libglib2.0-bin

      - name: Allow FUSE (needed by AppImage tools)
        run: |
          sudo modprobe fuse || true
          sudo chmod 666 /dev/fuse || true
          sudo chown root:$USER /dev/fuse || true

      - name: Add Qt tools to PATH
        run: |
          # Build qt6.qtbase and add its bin to PATH so qmake is available
          # to the build script outside of a nix shell
          nix build nixpkgs#qt6.qtbase --out-link /tmp/qt6base
          QT_BIN=$(find /tmp/qt6base -name "qmake" -type f | head -n1 | xargs dirname)
          echo "$QT_BIN" >> "$GITHUB_PATH"
          echo "QMAKE=$(find /tmp/qt6base -name qmake -type f | head -n1)" >> "$GITHUB_ENV"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x build-appimage.sh
          bash build-appimage.sh

      - name: Find built AppImage
        id: find_appimage
        run: |
          APPIMAGE=$(ls QuillAI-*.AppImage 2>/dev/null | head -n1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ No AppImage found after build"
            exit 1
          fi
          echo "path=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APPIMAGE)" >> "$GITHUB_OUTPUT"
          echo "✅ Found: $APPIMAGE ($(du -h $APPIMAGE | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuillAI ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.find_appimage.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
