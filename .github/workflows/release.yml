name: Build AppImage

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml requests markdown pygments PyQt6

      - name: Run test suite
        run: xvfb-run -a python3 tests/test_suite.py

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test   # ← build won't start if tests fail

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rsync \
            wget \
            fuse \
            libfuse2 \
            file \
            desktop-file-utils \
            libglib2.0-bin

      - name: Allow FUSE (needed by AppImage tools)
        run: |
          sudo modprobe fuse || true
          sudo chmod 666 /dev/fuse || true
          sudo chown root:$USER /dev/fuse || true

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/build-appimage.sh
          bash scripts/build-appimage.sh

      - name: Find built AppImage
        id: find_appimage
        run: |
          APPIMAGE=$(ls QuillAI-*.AppImage 2>/dev/null | head -n1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ No AppImage found after build"
            exit 1
          fi
          echo "path=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APPIMAGE)" >> "$GITHUB_OUTPUT"
          echo "✅ Found: $APPIMAGE ($(du -h $APPIMAGE | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QuillAI ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.find_appimage.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}